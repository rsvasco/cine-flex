  </defs>
  
  <rect width="500" height="750" fill="url(#bgGrad)" />
  
  <!-- Outer border -->
  <rect x="20" y="20" width="460" height="710" fill="none" stroke="#D4AF37" stroke-opacity="0.3" stroke-width="2" />
  
